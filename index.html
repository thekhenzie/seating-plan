<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khen & Justine Wedding Seating Plan</title>
<style>
  :root {
    --bg: #f7f3ee;
    --ink: #3d3630;
    --muted: #9a8f83;
    --accent: #b08968;
    --accent-dark: #8c6b4f;
    --danger: #c1666b;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%; margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  .splash {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .hearts {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .heart {
    position: absolute;
    bottom: -40px;
    font-size: 22px;
    color: var(--accent);
    opacity: 0;
    animation: rise 4.5s ease-in infinite;
  }
  .heart:nth-child(1) { left: 12%; font-size: 18px; animation-delay: 0s; color: var(--accent); }
  .heart:nth-child(2) { left: 26%; font-size: 26px; animation-delay: .6s; color: var(--danger); }
  .heart:nth-child(3) { left: 40%; font-size: 15px; animation-delay: 1.4s; color: var(--accent-dark); }
  .heart:nth-child(4) { left: 55%; font-size: 24px; animation-delay: .3s; color: var(--danger); }
  .heart:nth-child(5) { left: 68%; font-size: 17px; animation-delay: 2s; color: var(--accent); }
  .heart:nth-child(6) { left: 80%; font-size: 21px; animation-delay: 1s; color: var(--accent-dark); }
  .heart:nth-child(7) { left: 90%; font-size: 14px; animation-delay: 2.6s; color: var(--danger); }
  .heart:nth-child(8) { left: 5%;  font-size: 20px; animation-delay: 3.2s; color: var(--accent); }

  @keyframes rise {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: .85; }
    85%  { opacity: .5; }
    100% { transform: translateY(-100vh) rotate(18deg); opacity: 0; }
  }

  .center { text-align: center; z-index: 1; }
  .big-heart {
    font-size: 54px;
    display: inline-block;
    color: var(--danger);
    animation: beat 1.1s ease-in-out infinite;
  }
  @keyframes beat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.18); }
    40% { transform: scale(0.96); }
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 14px 0 6px;
    letter-spacing: .3px;
  }
  p.tagline {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 26px;
  }
  .enter {
    font-size: 13px;
    color: var(--accent-dark);
    text-decoration: none;
    border: 1px solid var(--accent);
    padding: 8px 18px;
    border-radius: 20px;
    transition: background .15s, color .15s;
  }
  .enter:hover { background: var(--accent); color: #fff; }
</style>
</head>
<body>
  <div class="splash">
    <div class="hearts" aria-hidden="true">
      <span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span>
      <span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span>
    </div>
    <div class="center">
      <span class="big-heart">❤</span>
      <h1>Khen &amp; Justine</h1>
      <p class="tagline">Loading your seating plan…</p>
      <a class="enter" href="seating-plan.html" id="enterLink">Enter now →</a>
    </div>
  </div>
<script>
  setTimeout(function () { location.href = "seating-plan.html"; }, 2600);
</script>
</body>
</html>
